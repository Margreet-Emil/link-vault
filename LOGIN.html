<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkVault — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-snip { width: 100%; min-height: 670px; position: absolute; padding: 40px; background: rgba(235, 48, 160, 0.57); }
    .login-snip .tab { font-size: 22px; margin-right: 15px; padding-bottom: 5px; margin: 0 15px 10px 0; display: inline-block; border-bottom: 2px solid transparent; cursor: pointer; color: #fff; text-transform: uppercase; }
    .login-snip .sign-in:checked + .tab,
    .login-snip .sign-up:checked + .tab { color: #fff; border-color: #39021c; }
    .login-space { min-height: 345px; position: relative; perspective: 1000px; transform-style: preserve-3d; }
    .login-space .group { margin-bottom: 15px; }
    .login-space .group .label,
    .login-space .group .input,
    .login-space .group .button { width: 100%; color: #fff; display: block; }
    .login-space .group .input,
    .login-space .group .button { border: none; padding: 15px 20px; border-radius: 25px; background: rgba(255,255,255,.1); }
    .login-space .group .label { color: #ffe2f3; font-size: 12px; }
    .login-space .group .button { background: #ab0c59; cursor: pointer; }
    .login-snip .sign-in, .login-snip .sign-up { display: none; }
    .login, .sign-up-form { position: absolute; top: 0; left: 0; right: 0; bottom: 0; transform: rotateY(180deg); backface-visibility: hidden; transition: all .4s linear; }
    .login-snip .sign-in:checked + .tab + .sign-up + .tab + .login-space .login { transform: rotate(0); }
    .login-snip .sign-up:checked + .tab + .login-space .sign-up-form { transform: rotate(0); }
    .error-msg { color: #ffb3d1; font-size: 13px; margin-top: -8px; margin-bottom: 8px; display: none; }
  </style>
</head>
<body>

<body class="bg-light">

<div class="container" style="max-width:420px; margin-top:80px;">
  <h3 class="text-center mb-4 fw-bold">LinkVault</h3>

  <ul class="nav nav-tabs mb-3" id="authTabs">
    <li class="nav-item">
      <button class="nav-link active" onclick="switchTab('login')">Login</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="switchTab('register')">Register</button>
    </li>
  </ul>

  <!-- LOGIN -->
  <div id="tab-login">
    <div id="login-error" class="alert alert-danger d-none"></div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="login-email" class="form-control" placeholder="you@example.com"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="login-password" class="form-control" placeholder="Password"/>
    </div>
    <button class="btn btn-primary w-100" onclick="doLogin()">Sign In</button>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" class="d-none">
    <div id="register-error" class="alert alert-danger d-none"></div>
    <div class="row mb-3">
      <div class="col">
        <label class="form-label">First Name</label>
        <input type="text" id="reg-firstname" class="form-control" placeholder="John"/>
      </div>
      <div class="col">
        <label class="form-label">Last Name</label>
        <input type="text" id="reg-lastname" class="form-control" placeholder="Doe"/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="reg-email" class="form-control" placeholder="you@example.com"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="reg-password" class="form-control" placeholder="Min 8 characters"/>
    </div>
    <button class="btn btn-primary w-100" onclick="doRegister()">Create Account</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  Auth.redirectIfLoggedIn();

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('d-none', tab !== 'login');
    document.getElementById('tab-register').classList.toggle('d-none', tab !== 'register');
    document.querySelectorAll('#authTabs .nav-link').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.remove('d-none');
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    document.getElementById('login-error').classList.add('d-none');

    if (!email || !password) { showErr('login-error', 'Please fill all fields.'); return; }

    try {
      const data = await apiFetch('/Auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      if (data?.token) {
        Auth.setToken(data.token);
        window.location.href = 'bookmarks.html';
      } else {
        showErr('login-error', 'Invalid email or password.');
      }
    } catch (err) {
      showErr('login-error', err.message);
    }
  }

  async function doRegister() {
    const firstName = document.getElementById('reg-firstname').value.trim();
    const lastName  = document.getElementById('reg-lastname').value.trim();
    const email     = document.getElementById('reg-email').value.trim();
    const password  = document.getElementById('reg-password').value;
    document.getElementById('register-error').classList.add('d-none');

    if (!firstName || !lastName || !email || !password) { showErr('register-error', 'Please fill all fields.'); return; }
    if (password.length < 8) { showErr('register-error', 'Password min 8 characters.'); return; }

    try {
      const data = await apiFetch('/Auth/register', {
        method: 'POST',
        body: JSON.stringify({ firstName, lastName, email, password })
      });
      if (data?.token) {
        Auth.setToken(data.token);
        window.location.href = 'bookmarks.html';
      } else {
        showErr('register-error', 'Registration failed.');
      }
    } catch (err) {
      showErr('register-error', err.message);
    }
  }
</script>
</body>
</html>
