<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkVault — Bookmark</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
   <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body >


<div id="navbar-placeholder"></div>

<div class="container mt-4" style="max-width: 800px;">
    <div id="alert-area"></div>
    
    <div class="mb-3">
        <a href="bookmarks.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to List
        </a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0" id="bm-title"> </h5>
            <span id="bm-date" class="text-muted small"></span>
        </div>
        <div class="card-body">
            <p><strong>URL:</strong> <a id="bm-url" href="#" target="_blank" rel="noopener"></a></p>
            <p><strong>Category:</strong> <span id="bm-category" class="badge bg-info text-dark"></span></p>
            
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h6 class="mb-0">Notes</h6>
            <button class="btn btn-primary btn-sm" onclick="showNoteModal()">+ Add Note</button>
        </div>
        <ul class="list-group list-group-flush" id="notes-list">
            <li class="list-group-item text-center py-3 text-muted">Loading notes...</li>
        </ul>
    </div>
</div>

<div class="modal fade" id="noteModal" >
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Note</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea id="noteContent" class="form-control" rows="4" placeholder="Write your note here..."></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addNote()">Save Note</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  Auth.requireAuth();
  initNavbar('bookmark');

  const params = new URLSearchParams(window.location.search);
  const bmId = params.get('id');
  let noteModal;

  document.addEventListener('DOMContentLoaded', () => {
    noteModal = new bootstrap.Modal(document.getElementById('noteModal'));

    if (!bmId) {
      window.location.href = 'bookmarks.html';
      return;
    }
    loadDetails();
    loadNotes();
  });

  async function loadDetails() {
    try {
      const bm = await apiFetch(`/Bookmark/${bmId}`);        // ✅ singular, no /api
      document.getElementById('bm-title').textContent    = bm.title;
      document.getElementById('bm-url').textContent      = bm.url;
      document.getElementById('bm-url').href             = bm.url;
      document.getElementById('bm-date').textContent     = fmtDate(bm.createdAt);
      document.getElementById('bm-category').textContent = bm.categoryName || '—'; // ✅ direct field, no extra fetch
    } catch (err) {
      showAlert(err.message, 'danger');
    }
  }

  async function loadNotes() {
    const list = document.getElementById('notes-list');
    try {
      const notes = await apiFetch(`/bookmarks/${bmId}/notes`); // ✅ matches Swagger: /api/bookmarks/{bookmarkId}/notes
      if (!notes.length) {
        list.innerHTML = '<li class="list-group-item text-center py-3 text-muted">No notes found.</li>';
        return;
      }
      list.innerHTML = notes.map(n => `
        <li class="list-group-item d-flex justify-content-between align-items-start">
          <div class="ms-2 me-auto">
            <div class="small text-muted mb-1">${fmtDate(n.createdAt)}</div>
            <div style="white-space: pre-line;">${esc(n.content)}</div>
          </div>
          <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteNote(${n.id})">
            <i class="bi bi-trash"></i>
          </button>
        </li>
      `).join('');
    } catch (err) {
      list.innerHTML = '<li class="list-group-item text-danger">Error loading notes.</li>';
    }
  }

  function showNoteModal() {
    document.getElementById('noteContent').value = '';
    noteModal.show();
  }

  async function addNote() {
    const content = document.getElementById('noteContent').value.trim();
    if (!content) return;

    try {
      await apiFetch(`/bookmarks/${bmId}/notes`, {  // ✅ matches Swagger
        method: 'POST',
        body: JSON.stringify({ content })
      });
      noteModal.hide();
      showAlert('Note added successfully!', 'success');
      loadNotes();
    } catch (err) {
      showAlert(err.message, 'danger');
    }
  }

  async function deleteNote(noteId) {
    if (!confirm('Are you sure you want to delete this note?')) return;
    try {
      await apiFetch(`/bookmarks/${bmId}/notes/${noteId}`, { method: 'DELETE' }); // ✅ matches Swagger
      showAlert('Note deleted.', 'success');
      loadNotes();
    } catch (err) {
      showAlert(err.message, 'danger');
    }
  }
</script>
</body>
</html>
