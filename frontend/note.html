<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkVault — Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container-fluid mt-4 px-4">
  <div id="alert-area"></div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Notes</h4>
    <button class="btn btn-primary btn-sm" onclick="openCreate()">+ New Note</button>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <table class="table table-bordered table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Title</th>
            <th>Content</th>
            <th>Category</th>
            <th class="text-center" style="width:160px">Actions</th>
          </tr>
        </thead>
        <tbody id="noteBody">
          <tr><td colspan="4" class="text-center py-4 text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="noteModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="noteModalTitle">New Note</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="note-modal-error" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label">Title *</label>
          <input type="text" id="noteTitle" class="form-control" placeholder="Note title"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Content *</label>
          <textarea id="noteContent" class="form-control" rows="4" placeholder="Write your note..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Category *</label>
          <select id="noteCategory" class="form-select">
            <option value="">Select category...</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveNote()">
          <span id="noteSaveTxt">Create</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
  Auth.requireAuth();
  initNavbar('notes');

  let notes      = [];
  let categories = [];
  let editingId  = null;
  let modal      = null;

  document.addEventListener('DOMContentLoaded', async () => {
    modal = new bootstrap.Modal(document.getElementById('noteModal'));
    await loadCategories();
    await loadNotes();
  });

  async function loadCategories() {
    try {
      const data = await apiFetch('/Category');
      categories = Array.isArray(data) ? data : (data?.items || []);
    } catch (err) { console.error(err); }
  }

  async function loadNotes() {
    const tbody = document.getElementById('noteBody');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">Loading...</td></tr>';
    try {
      const data = await apiFetch('/Note');  
      console.log(data[0]);
      notes = Array.isArray(data) ? data : (data?.items || []);

      if (!notes.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No notes yet. Click "+ New Note" to create one.</td></tr>';
        return;
      }

      tbody.innerHTML = notes.map(n => `
        <tr>
          <td>${esc(n.title)}</td>
          <td>${esc(n.content?.substring(0, 80))}${n.content?.length > 80 ? '…' : ''}</td>
          <td>${esc(n.categoryName || '—')}</td>
          <td class="text-center">
           
              <button class="btn btn-sm btn-warning me-1" onclick="openEdit(${n.noteId})">Edit</button>
  <button class="btn btn-sm btn-danger" onclick="deleteNote(${n.noteId}, '${esc(n.title)}')">Delete</button>
`).join('');;
    } catch (err) {
      showAlert(err.message, 'danger');
    }
  }

  function populateCatDropdown(selectedId = '') {
    const sel = document.getElementById('noteCategory');
    sel.innerHTML = '<option value="">Select category...</option>';
    categories.forEach(c => {
      sel.innerHTML += `<option value="${c.id}" ${c.id == selectedId ? 'selected' : ''}>${esc(c.categoryName)}</option>`;
    });
  }

  function openCreate() {
    editingId = null;
    document.getElementById('noteModalTitle').textContent = 'New Note';
    document.getElementById('noteSaveTxt').textContent    = 'Create';
    document.getElementById('noteTitle').value   = '';
    document.getElementById('noteContent').value = '';
    document.getElementById('note-modal-error').classList.add('d-none');
    populateCatDropdown();
    modal.show();
  }

 function openEdit(id) {
  const note = notes.find(n => n.noteId === id);  
  if (!note) return;
  editingId = id;
  document.getElementById('noteModalTitle').textContent = 'Edit Note';
  document.getElementById('noteSaveTxt').textContent    = 'Update';
  document.getElementById('noteTitle').value   = note.title   || '';
  document.getElementById('noteContent').value = note.content || '';
  document.getElementById('note-modal-error').classList.add('d-none');
  populateCatDropdown(note.categoryId);
  modal.show();
}
  async function saveNote() {
    const title      = document.getElementById('noteTitle').value.trim();
    const content    = document.getElementById('noteContent').value.trim();
    const categoryId = document.getElementById('noteCategory').value;
    const errEl      = document.getElementById('note-modal-error');
    errEl.classList.add('d-none');

    if (!title || !content || !categoryId) {
      errEl.textContent = 'All fields are required.';
      errEl.classList.remove('d-none');
      return;
    }

    const body = { title, content, categoryId: parseInt(categoryId) };

    try {
      if (editingId) {
        await apiFetch('/Note/' + editingId, {   
          method: 'PUT',
          body: JSON.stringify(body)
        });
        showAlert('Note updated.', 'success');
      } else {
        await apiFetch('/Note', {               
          method: 'POST',
          body: JSON.stringify(body)
        });
        showAlert('Note created.', 'success');
      }
      modal.hide();
      loadNotes();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('d-none');
    }
  }

  async function deleteNote(id, title) {
    if (!confirm('Delete "' + title + '"?')) return;
    try {
      await apiFetch('/Note/' + id, { method: 'DELETE' });
      showAlert('Note deleted.', 'success');
      loadNotes();
    } catch (err) {
      showAlert(err.message, 'danger');
    }
  }
</script>
</body>
</html>
