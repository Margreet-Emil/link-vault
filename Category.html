
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Categories</h5>
    <button class="btn btn-primary btn-sm" onclick="openCreate()">
      + New Category
    </button>
  </div>

  <!-- table -->
  <div class="card">
    <div class="card-body p-0">
      <table class="table table-bordered table-hover mb-0" id="catTable">
        <thead class="table-light">
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th class="text-center" style="width:160px">Actions</th>
          </tr>
        </thead>
        <tbody id="catBody">
          <tr><td colspan="3" class="text-center py-4 text-muted">No categories yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="catModal" >
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="catModalTitle">New Category</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modal-error" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label">Name *</label>
          <input type="text" id="catName" class="form-control" placeholder="Category name"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Description (optional)</label>
          <textarea id="catDesc" class="form-control" rows="2" placeholder="Description"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" onclick="saveCategory()">
          <span id="saveBtnText">Create</span>
        </button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
Auth.requireAuth();
initNavbar('categories');

let categories = [];
let editingId  = null;
let modal      = null;

document.addEventListener('DOMContentLoaded', () => {
  modal = new bootstrap.Modal(document.getElementById('catModal'));
  loadCategories();
});

async function loadCategories() {
  const tbody = document.getElementById('catBody'); 

  try {
    const cats = await apiFetch('/Category');
    console.log(cats[0]); 
    categories = cats;

    if (!cats.length) {
      tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">No categories yet. Click "+ New Category" to create one.</td></tr>`;
      return;
    }
tbody.innerHTML = cats.map(c => `
  <tr>
    <td>${c.categoryName}</td>
    <td>${c.categoryDescription || '-'}</td>
    <td class="text-center">
      <button class="btn btn-sm btn-warning me-1" onclick="openEdit(${c.id})">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteCategory(${c.id}, '${c.categoryName}')">Delete</button>
    </td>
  </tr>
`).join('');

  } catch (err) {
    showAlert(err.message, 'danger');
  }
}

function openCreate() {
  editingId = null;
  document.getElementById('catModalTitle').textContent = 'New Category';
  document.getElementById('saveBtnText').textContent   = 'Create';
  document.getElementById('catName').value = ''; 
  document.getElementById('catDesc').value = '';  
  document.getElementById('modal-error').classList.add('d-none');
  modal.show();
}
function openEdit(id) {
  const cat = categories.find(c => c.id === id);
  if (!cat) return;
  editingId = id;
  document.getElementById('catModalTitle').textContent = 'Edit Category';
  document.getElementById('saveBtnText').textContent   = 'Update';
  document.getElementById('catName').value = cat.categoryName        || '';  
  document.getElementById('catDesc').value = cat.categoryDescription || '';  
  document.getElementById('modal-error').classList.add('d-none');
  modal.show();
}

async function saveCategory() {
  const name        = document.getElementById('catName').value.trim();
  const description = document.getElementById('catDesc').value.trim();
  const errEl       = document.getElementById('modal-error');
  errEl.classList.add('d-none');

  if (!name) {
    errEl.textContent = 'Name is required.';
    errEl.classList.remove('d-none');
    return;
  }

  try {
    if (editingId) {
      await apiFetch('/Category/' + editingId, {
        method: 'PUT',
        body: JSON.stringify({ name, description })
      });
      showAlert('Category updated successfully.', 'success');
    } else {
      await apiFetch('/Category', {
        method: 'POST',
        body: JSON.stringify({ name, description })
      });
      showAlert('Category created successfully.', 'success');
    }
    modal.hide();
    document.activeElement.blur();
    loadCategories();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('d-none');
  }
}

async function deleteCategory(id, name) {
  if (!confirm('Delete "' + name + '"?\n\nWill fail if it has bookmarks or notes.')) return;
  try {
    await apiFetch('/Category/' + id, { method: 'DELETE' });
    showAlert('Category deleted.', 'success');
    loadCategories();
  } catch (err) {
    showAlert(err.message, 'danger');
  }
}
</script>
</body>
</html>
